<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>收银方式配置原型</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f6fa;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
    }

    .page {
      min-height: 100vh;
      padding: 26px 8px 74px;
      background:
        repeating-linear-gradient(-14deg, transparent 0 136px, rgba(156, 163, 175, .10) 137px 138px),
        linear-gradient(180deg, rgba(255, 255, 255, .90), rgba(243, 246, 250, .96));
      position: relative;
    }

    .watermark {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .28;
      background-image: repeating-linear-gradient(-14deg, transparent 0 136px, rgba(148, 163, 184, .22) 137px 138px);
    }

    .title {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .panel {
      border: 1px solid #d8dee9;
      background: #fff;
      position: relative;
      z-index: 1;
      min-width: 1220px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      height: 39px;
      background: #eef2f7;
      color: #4b5563;
      font-weight: 500;
      border-right: 1px solid #d8dee9;
      border-bottom: 1px solid #d8dee9;
    }

    td {
      height: 55px;
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      padding: 8px;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    .col-no {
      width: 34px;
      text-align: center;
    }

    .col-type,
    .col-channel {
      width: 201px;
    }

    .col-pay {
      width: auto;
    }

    .col-actions {
      width: 220px;
      text-align: center;
    }

    select {
      width: 100%;
      max-width: 184px;
      height: 22px;
      padding: 0 28px 0 10px;
      border: 1px solid #cfd8e3;
      border-radius: 4px;
      background: #fff;
      color: #1f2937;
      font-size: 12px;
      outline: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #7b8794 50%),
        linear-gradient(135deg, #7b8794 50%, transparent 50%);
      background-position:
        calc(100% - 13px) 9px,
        calc(100% - 8px) 9px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    select:focus {
      border-color: #2f6bff;
      box-shadow: 0 0 0 2px rgba(47, 107, 255, .12);
    }

    .pay-select {
      max-width: 188px;
    }

    .pay-cell {
      min-height: 38px;
    }

    .pay-editor {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      max-width: 100%;
    }

    .multi-trigger {
      width: 188px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 10px;
      color: #1f2937;
      text-align: left;
      overflow: hidden;
    }

    .multi-trigger span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .multi-trigger::after {
      content: "";
      width: 0;
      height: 0;
      margin-left: 8px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #7b8794;
      flex: 0 0 auto;
    }

    .multi-menu {
      position: absolute;
      top: 26px;
      left: 0;
      width: 318px;
      display: none;
      padding: 6px;
      border: 1px solid #cfd8e3;
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .14);
      z-index: 5;
    }

    .pay-editor.open .multi-menu {
      display: block;
    }

    .multi-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      color: #1f2937;
    }

    .multi-option:hover {
      background: #f3f6fb;
    }

    .config-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-row {
      display: grid;
      grid-template-columns: minmax(250px, 290px) 116px 132px 128px 24px;
      align-items: center;
      gap: 10px;
      min-height: 28px;
      width: max-content;
      max-width: 100%;
      color: #334155;
    }

    .config-row.simple {
      grid-template-columns: minmax(250px, 290px) 24px;
    }

    .config-row.default-only {
      grid-template-columns: minmax(250px, 290px) 116px 24px;
    }

    .config-row strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      color: #1f2937;
    }

    .config-row select {
      max-width: none;
      width: 100%;
      height: 24px;
    }

    .config-row select.required-error {
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, .12);
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      white-space: nowrap;
    }

    .subsidy {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 24px;
      white-space: nowrap;
    }

    .subsidy select {
      width: 52px;
      height: 24px;
      padding-left: 8px;
    }

    .default-select select {
      width: 52px;
      height: 24px;
      padding-left: 8px;
    }

    .remove-config {
      width: 24px;
      padding: 0;
      color: #94a3b8;
      border-color: transparent;
      background: transparent;
      font-size: 16px;
      line-height: 1;
    }

    .remove-config:hover {
      color: #ef4444;
      border-color: transparent;
      background: transparent;
    }

    .no-config {
      color: #94a3b8;
      line-height: 24px;
    }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    button {
      height: 24px;
      border: 1px solid #d1d8e3;
      border-radius: 4px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-size: 12px;
      padding: 0 10px;
      transition: color .15s ease, border-color .15s ease, background .15s ease, opacity .15s ease;
      white-space: nowrap;
    }

    button:hover {
      border-color: #2f6bff;
      color: #2f6bff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .delete {
      border-color: #ff5a5f;
      background: #ff5a5f;
      color: #fff;
      min-width: 50px;
    }

    .delete:hover {
      border-color: #e5484d;
      background: #e5484d;
      color: #fff;
    }

    .add-area {
      height: 36px;
      margin-top: 14px;
      border: 1px dashed #d8dee9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.5);
      position: relative;
      z-index: 1;
      min-width: 1220px;
    }

    .add {
      border: 0;
      color: #2f6bff;
      background: transparent;
      font-weight: 500;
    }

    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48px;
      padding: 10px 8px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: rgba(255, 255, 255, .88);
      border-top: 1px solid #e5e7eb;
      z-index: 2;
    }

    .save {
      border-color: #2f6bff;
      background: #2f6bff;
      color: #fff;
    }

    .save:hover {
      border-color: #2458dc;
      background: #2458dc;
      color: #fff;
    }

    .ghost {
      background: #fff;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 58px;
      min-width: 220px;
      max-width: 360px;
      padding: 10px 12px;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      background: #eff6ff;
      color: #1d4ed8;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .12);
      z-index: 3;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      line-height: 1.6;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      height: 86px;
      color: #64748b;
      text-align: center;
    }

    @media (max-width: 1220px) {
      .page {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="watermark"></div>
    <h1 class="title">收银方式：</h1>
    <section class="panel" aria-label="收银方式配置表">
      <table>
        <thead>
          <tr>
            <th class="col-no">序号</th>
            <th class="col-type">渠道类型（编号）</th>
            <th class="col-channel">支付渠道（编号）</th>
            <th class="col-pay">渠道账户</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <div class="add-area">
      <button class="add" id="addRow">＋ 添加收银方式</button>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="footer">
      <button class="save" id="save">保 存</button>
      <button class="ghost" id="cancel">取 消</button>
    </div>
  </main>

  <script>
    const typeOptions = [
      "APP_支付宝（T040401）",
      "APP_云闪付（T040416）",
      "APP_微信（T040402）",
      "数字人民币（T040111）"
    ];

    const cloudPayType = "APP_云闪付（T040416）";

    const channelOptions = [
      "APP_支付宝（C040401）",
      "云闪付_银联（C040431）",
      "APP_微信（C040403）",
      "数币_中行（C040422）"
    ];

    const payOptions = [
      { id: "alipay", label: "运营-支付宝（CA41908130090）" },
      { id: "unionpay", label: "云闪付_银联（CA2260227105633）" },
      { id: "wechat", label: "运营-微信（CA41908050052）" },
      { id: "ecny", label: "商城-中行数币（CA42208220613）" },
      { id: "unionpay_subsidy", label: "云闪付_银联_国补（CA2260227105634）" }
    ];

    const subjectOptions = ["8000", "8296"];

    const seedRows = [
      {
        type: "APP_支付宝（T040401）",
        channel: "APP_支付宝（C040401）",
        pays: [{ id: "alipay", useDefault: "", subject: "", account: "运营-支付宝", subsidy: "" }]
      },
      {
        type: "APP_云闪付（T040416）",
        channel: "云闪付_银联（C040431）",
        pays: [
          { id: "unionpay", useDefault: "", subject: "", account: "云闪付_银联", subsidy: "" },
          { id: "unionpay_subsidy", useDefault: "", subject: "", account: "云闪付_银联_国补", subsidy: "" }
        ]
      },
      {
        type: "APP_微信（T040402）",
        channel: "APP_微信（C040403）",
        pays: [{ id: "wechat", useDefault: "", subject: "", account: "运营-微信", subsidy: "" }]
      },
      {
        type: "数字人民币（T040111）",
        channel: "数币_中行（C040422）",
        pays: [{ id: "ecny", useDefault: "", subject: "", account: "中行数币", subsidy: "" }]
      }
    ];

    let rows = cloneRows(seedRows);
    const body = document.querySelector("#rows");
    const toast = document.querySelector("#toast");
    let toastTimer;
    let openMenuIndex = null;
    let validationErrors = new Set();

    function cloneRows(source) {
      return source.map((row) => ({
        type: row.type,
        channel: row.channel,
        pays: row.pays.map((pay) => ({ ...pay }))
      }));
    }

    function findPay(id) {
      return payOptions.find((option) => option.id === id);
    }

    function optionList(options, selected) {
      return options.map((option) => {
        const isSelected = option === selected ? "selected" : "";
        return `<option ${isSelected}>${option}</option>`;
      }).join("");
    }

    function optionObjectList(options, selected) {
      return [`<option value="" ${selected === "" ? "selected" : ""}></option>`].concat(options.map((option) => {
        const isSelected = option === selected ? "selected" : "";
        return `<option ${isSelected}>${option}</option>`;
      })).join("");
    }

    function paySummary(pays) {
      if (!pays.length) return "请选择支付渠道";
      if (pays.length === 1) return findPay(pays[0].id)?.label || "已选择 1 项";
      return `已选择 ${pays.length} 项支付渠道`;
    }

    function selectedPayIds(row) {
      return new Set(row.pays.map((pay) => pay.id));
    }

    function defaultPayConfig(id) {
      const option = findPay(id);
      const isSubsidy = id.includes("subsidy");
      return {
        id,
        useDefault: "",
        subject: "",
        account: option?.label.includes("支付宝") ? "运营-支付宝" : option?.label.includes("微信") ? "运营-微信" : option?.label.includes("数币") ? "中行数币" : isSubsidy ? "云闪付_银联_国补" : "云闪付_银联",
        subsidy: ""
      };
    }

    function canConfigureExtra(row) {
      return row.type === cloudPayType;
    }

    function canSelectMultiple(row) {
      return row.type === cloudPayType;
    }

    function errorKey(rowIndex, payIndex, field) {
      return `${rowIndex}-${payIndex}-${field}`;
    }

    function renderPayEditor(row, index) {
      const ids = selectedPayIds(row);
      const menuClass = openMenuIndex === index ? "pay-editor open" : "pay-editor";
      const extraEnabled = canConfigureExtra(row);
      const defaultEnabled = extraEnabled && row.pays.length > 1;
      const inputType = canSelectMultiple(row) ? "checkbox" : "radio";
      const options = payOptions.map((option) => `
        <label class="multi-option">
          <input type="${inputType}" name="pay-${index}" data-action="togglePay" data-index="${index}" data-id="${option.id}" ${ids.has(option.id) ? "checked" : ""}>
          <span>${option.label}</span>
        </label>
      `).join("");

      const configs = row.pays.length ? row.pays.map((pay, payIndex) => {
        const showAdvanced = defaultEnabled && pay.useDefault === "否";
        const rowClass = !defaultEnabled ? "simple" : showAdvanced ? "" : "default-only";
        return `
        <div class="config-row ${rowClass}">
          <strong title="${findPay(pay.id)?.label || ""}">${findPay(pay.id)?.label || pay.id}</strong>
          ${defaultEnabled ? `
            <label class="field-label default-select">是否默认
              <select class="${validationErrors.has(errorKey(index, payIndex, "useDefault")) ? "required-error" : ""}" data-index="${index}" data-pay-index="${payIndex}" data-config="useDefault">
                <option value="" ${pay.useDefault === "" ? "selected" : ""}></option>
                <option ${pay.useDefault === "是" ? "selected" : ""}>是</option>
                <option ${pay.useDefault === "否" ? "selected" : ""}>否</option>
              </select>
            </label>
            ${showAdvanced ? `
              <label class="field-label">收款主体
                <select class="${validationErrors.has(errorKey(index, payIndex, "subject")) ? "required-error" : ""}" data-index="${index}" data-pay-index="${payIndex}" data-config="subject">${optionObjectList(subjectOptions, pay.subject)}</select>
              </label>
              <label class="subsidy">是否国补
                <select class="${validationErrors.has(errorKey(index, payIndex, "subsidy")) ? "required-error" : ""}" data-index="${index}" data-pay-index="${payIndex}" data-config="subsidy">
                  <option value="" ${pay.subsidy === "" ? "selected" : ""}></option>
                  <option ${pay.subsidy === "否" ? "selected" : ""}>否</option>
                  <option ${pay.subsidy === "是" ? "selected" : ""}>是</option>
                </select>
              </label>
            ` : ""}
          ` : ""}
          <button class="remove-config" data-action="removePay" data-index="${index}" data-id="${pay.id}" title="移除该支付渠道">×</button>
        </div>
      `;
      }).join("") : `<div class="no-config">请先选择至少一个支付渠道</div>`;

      return `
        <div class="${menuClass}" data-editor-index="${index}">
          <button class="multi-trigger" data-action="togglePayMenu" data-index="${index}" type="button"><span>${paySummary(row.pays)}</span></button>
          <div class="multi-menu">${options}</div>
          <div class="config-list">${configs}</div>
        </div>
      `;
    }

    function render() {
      if (rows.length === 0) {
        body.innerHTML = `<tr><td class="empty" colspan="5">暂无收银方式，请点击下方添加</td></tr>`;
        return;
      }

      body.innerHTML = rows.map((row, index) => `
        <tr>
          <td class="col-no">${index + 1}</td>
          <td><select data-index="${index}" data-field="type">${optionList(typeOptions, row.type)}</select></td>
          <td><select data-index="${index}" data-field="channel">${optionList(channelOptions, row.channel)}</select></td>
          <td class="pay-cell">${renderPayEditor(row, index)}</td>
          <td>
            <div class="actions">
              <button class="delete" data-action="delete" data-index="${index}" title="删除当前行">删 除</button>
              <button data-action="up" data-index="${index}" ${index === 0 ? "disabled" : ""} title="上移当前行">↑ 上移</button>
              <button data-action="down" data-index="${index}" ${index === rows.length - 1 ? "disabled" : ""} title="下移当前行">↓ 下移</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.innerHTML = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function validateBeforeSave() {
      validationErrors = new Set();
      let missingCount = 0;

      rows.forEach((row, rowIndex) => {
        if (!canSelectMultiple(row) && row.pays.length > 1) {
          missingCount += 1;
          return;
        }

        if (!canConfigureExtra(row)) return;

        const defaultYesIndexes = row.pays
          .map((pay, payIndex) => pay.useDefault === "是" ? payIndex : -1)
          .filter((payIndex) => payIndex > -1);

        if (row.pays.length > 1 && defaultYesIndexes.length === 0) {
          row.pays.forEach((pay, payIndex) => {
            validationErrors.add(errorKey(rowIndex, payIndex, "useDefault"));
            missingCount += 1;
          });
        }

        if (defaultYesIndexes.length > 1) {
          defaultYesIndexes.forEach((payIndex) => {
            validationErrors.add(errorKey(rowIndex, payIndex, "useDefault"));
            missingCount += 1;
          });
        }

        row.pays.forEach((pay, payIndex) => {
          if (pay.useDefault !== "否") return;

          if (!pay.subject) {
            validationErrors.add(errorKey(rowIndex, payIndex, "subject"));
            missingCount += 1;
          }

          if (!pay.subsidy) {
            validationErrors.add(errorKey(rowIndex, payIndex, "subsidy"));
            missingCount += 1;
          }
        });
      });

      return missingCount;
    }

    body.addEventListener("change", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);

      if (target.dataset.action === "togglePay") {
        const row = rows[index];
        const existing = row.pays.findIndex((pay) => pay.id === target.dataset.id);

        if (!canSelectMultiple(row)) {
          row.pays = [defaultPayConfig(target.dataset.id)];
          openMenuIndex = null;
          render();
          return;
        }

        if (target.checked && existing === -1) {
          row.pays.push(defaultPayConfig(target.dataset.id));
        }
        if (!target.checked && existing > -1) {
          row.pays.splice(existing, 1);
        }
        if (row.pays.length <= 1) {
          row.pays.forEach((pay) => {
            pay.useDefault = "";
            pay.subject = "";
            pay.subsidy = "";
          });
        }
        openMenuIndex = index;
        render();
        return;
      }

      if (target.dataset.config) {
        const payIndex = Number(target.dataset.payIndex);
        const pay = rows[index].pays[payIndex];
        pay[target.dataset.config] = target.value;
        validationErrors.delete(errorKey(index, payIndex, target.dataset.config));
        if (target.dataset.config === "useDefault" && target.value !== "否") {
          pay.subject = "";
          pay.subsidy = "";
          validationErrors.delete(errorKey(index, payIndex, "subject"));
          validationErrors.delete(errorKey(index, payIndex, "subsidy"));
          render();
        }
        if (target.dataset.config === "useDefault" && target.value === "否") {
          render();
        }
        if (target.dataset.config !== "useDefault") {
          render();
        }
        return;
      }

      if (target.tagName !== "SELECT") return;
      rows[index][target.dataset.field] = target.value;
      if (target.dataset.field === "type" && !canConfigureExtra(rows[index])) {
        rows[index].pays = rows[index].pays.slice(0, 1);
        rows[index].pays.forEach((pay) => {
          pay.subject = "";
          pay.subsidy = "";
          pay.useDefault = "";
        });
      }
      if (target.dataset.field === "type") {
        render();
      }
    });

    body.addEventListener("click", (event) => {
      const target = event.target.closest("button");
      if (!target) return;
      const index = Number(target.dataset.index);
      if (!target.dataset.action) return;
      if (target.disabled) return;

      if (target.dataset.action === "togglePayMenu") {
        openMenuIndex = openMenuIndex === index ? null : index;
        render();
        return;
      }

      if (target.dataset.action === "removePay") {
        rows[index].pays = rows[index].pays.filter((pay) => pay.id !== target.dataset.id);
        render();
        return;
      }

      if (target.dataset.action === "delete") {
        rows.splice(index, 1);
        openMenuIndex = null;
      }

      if (target.dataset.action === "up" && index > 0) {
        [rows[index - 1], rows[index]] = [rows[index], rows[index - 1]];
      }

      if (target.dataset.action === "down" && index < rows.length - 1) {
        [rows[index + 1], rows[index]] = [rows[index], rows[index + 1]];
      }

      render();
    });

    document.querySelector("#addRow").addEventListener("click", () => {
      rows.push({
        type: typeOptions[0],
        channel: channelOptions[0],
        pays: [defaultPayConfig("alipay")]
      });
      render();
      showToast("已添加 1 条收银方式");
    });

    document.querySelector("#save").addEventListener("click", () => {
      const missingCount = validateBeforeSave();
      if (missingCount > 0) {
        render();
        showToast(`请检查配置：云闪付多账户必须选择一个默认项；非云闪付只能选择一个渠道账户；默认选否时收款主体和是否国补不能为空`);
        return;
      }

      const payCount = rows.reduce((total, row) => total + row.pays.length, 0);
      showToast(`保存成功，共 ${rows.length} 条收银方式，${payCount} 条支付渠道配置`);
    });

    document.querySelector("#cancel").addEventListener("click", () => {
      rows = cloneRows(seedRows);
      openMenuIndex = null;
      validationErrors = new Set();
      render();
      showToast("已恢复为初始配置");
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".pay-editor")) {
        openMenuIndex = null;
        render();
      }
    });

    render();
  </script>
</body>
</html>
